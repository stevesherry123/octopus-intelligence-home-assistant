name: Octopus Intelligence
version: "0.4.0"
slug: octopus_intelligence
description: Local-first Octopus Agile price analysis and AI commentary
startup: application
boot: auto
init: false
homeassistant_api: true
arch:
  - aarch64
  - amd64
options:
  interval_hours: 3
  openai_api_key: ""
  openai_model: gpt-4o-mini
  forecast_entity: sensor.octopus_price_feed_clean
  analysis_entity: sensor.octopus_intelligence
  announcement_entity: input_text.announce_text
  publish_announcement: true
  lookback_days: 14
  history_cache_hours: 24
  timezone: Europe/London
schema:
  interval_hours: float(0.5,24)
  openai_api_key: password?
  openai_model: str
  forecast_entity: str
  analysis_entity: str
  announcement_entity: str
  publish_announcement: bool
  lookback_days: int(1,90)
  history_cache_hours: int(1,168)
  timezone: str

